<!-- 履歴パネル -->
<div id="hist-overlay" onclick="closeHistPanel()"></div>
<div id="hist-panel">
  <div id="hist-panel-hdr">
    <span>📌 物件表 履歴</span>
    <button onclick="closeHistPanel()">✕</button>
  </div>
  <button id="hist-save-btn" onclick="saveHistItem()">💾 今の状態を保存</button>
  <div id="hist-list"></div>
</div>

<script>
// ===== 物件表 履歴機能 =====
(function() {
  const HIST_KEY = 'bukken_history';
  const MAX_HIST = 30;

  function ctx() {
    if (!window._bukkenCtx) console.warn('[bukken hist] _bukkenCtx is not yet set');
    return window._bukkenCtx || null;
  }

  function getHist() {
    try { return JSON.parse(localStorage.getItem(HIST_KEY) || '[]'); } catch(e) { return []; }
  }
  function setHist(h) {
    try { localStorage.setItem(HIST_KEY, JSON.stringify(h)); } catch(e) {}
  }

  function snapshot() {
    const c = ctx(); if (!c) return null;
    const yf = c.getYoubiFilter();
    const ss = c.getSortState();
    const hdrs = c.getHeaders();
    return {
      id:           Date.now(),
      timestamp:    Date.now(),
      filename:     c.getFilename(),
      sheetName:    c.getSheetName(),
      sortState:    { ...ss },
      sortColName:  (ss && ss.col >= 0) ? (hdrs[ss.col] || `列${ss.col+1}`) : '',
      searchQuery:  c.getSearchQuery(),
      youbiFilter: yf && yf.colIdx !== null ? {
        colIdx:         yf.colIdx,
        colName:        hdrs[yf.colIdx] || `列${yf.colIdx+1}`,
        selectedValues: [...yf.selectedValues],
        filterType:     yf.filterType
      } : null
    };
  }

  function makeLabel(item) {
    const parts = [];
    if (item.sortState && item.sortState.col >= 0) {
      const name = item.sortColName || `列${item.sortState.col+1}`;
      parts.push((item.sortState.dir === 1 ? '▲' : '▼') + name);
    }
    if (item.youbiFilter && item.youbiFilter.colIdx !== null && item.youbiFilter.selectedValues.length > 0) {
      const colName = item.youbiFilter.colName || `列${item.youbiFilter.colIdx+1}`;
      const rawVals = item.youbiFilter.selectedValues.map(v => v.startsWith('\x00exact:') ? v.slice(7) : v);
      const vals = rawVals.slice(0, 3).join('・');
      const more = rawVals.length > 3 ? `…他${rawVals.length - 3}件` : '';
      parts.push(`🔍${colName}: ${vals}${more}`);
    }
    if (item.searchQuery) parts.push(`"${item.searchQuery}"`);
    return parts.length > 0 ? parts.join(' · ') : '全表示';
  }

  function fmtTime(ts) {
    const d = new Date(ts), p = n => String(n).padStart(2,'0');
    return `${d.getMonth()+1}/${d.getDate()} ${p(d.getHours())}:${p(d.getMinutes())}`;
  }

  function renderHist() {
    const items = getHist();
    const el = document.getElementById('hist-list');
    if (!el) return;
    if (items.length === 0) {
      el.innerHTML = '<div id="hist-empty">保存した履歴はありません<br><small>「今の状態を保存」で現在の<br>フィルター・ソートを記録できます</small></div>';
      return;
    }
    el.innerHTML = items.map(item => `
      <div class="hist-item" onclick="restoreHist(${item.id})">
        <div class="hist-item-body">
          <div class="hist-item-file">📊 ${item.filename || '(ファイル未選択)'}</div>
          <div class="hist-item-meta">${makeLabel(item)}</div>
          <div class="hist-item-time">🕐 ${fmtTime(item.timestamp)}</div>
        </div>
        <button class="hist-del-btn" onclick="event.stopPropagation(); deleteHist(${item.id})">🗑</button>
      </div>
    `).join('');
  }

  window.saveHistItem = function() {
    const item = snapshot();
    // ファイル名が取れなかった場合はセレクタから補完
    if (item && !item.filename) {
      const sel = document.getElementById('gitFileSelector');
      if (sel && sel.value && sel.value !== '__local__' && sel.value !== '') {
        item.filename = decodeURIComponent(sel.value);
        item.sheetName = item.sheetName || '';
      }
    }
    if (!item || !item.filename) { alert('先にファイルを読み込んでください。'); return; }
    const h = getHist();
    h.unshift(item);
    if (h.length > MAX_HIST) h.length = MAX_HIST;
    setHist(h);
    renderHist();
    const btn = document.getElementById('hist-save-btn');
    btn.textContent = '✅ 保存しました';
    btn.classList.add('saved');
    setTimeout(() => { btn.textContent = '💾 今の状態を保存'; btn.classList.remove('saved'); }, 1800);
  };

  window.deleteHist = function(id) {
    setHist(getHist().filter(x => x.id !== id));
    renderHist();
  };

  window.restoreHist = function(id) {
    const item = getHist().find(x => x.id === id);
    if (!item) return;
    closeHistPanel();

    function applyState() {
      const c = ctx(); if (!c) return;
      // ソート
      if (item.sortState && item.sortState.col >= 0) {
        c.setSortState({ ...item.sortState });
        const ci = item.sortState.col, dir = item.sortState.dir;
        if (dir !== 0) {
          c.getDataArray().sort((a, b) => {
            const va = String(a[ci]||'').trim(), vb = String(b[ci]||'').trim();
            if (va===vb) return 0; if (va==='') return 1; if (vb==='') return -1;
            const na=parseFloat(va), nb=parseFloat(vb);
            if (!isNaN(na)&&!isNaN(nb)) return dir*(na-nb);
            return dir * c.naturalCompare(va, vb);
          });
        }
      }
      // 検索
      c.setSearchQuery(item.searchQuery || '');
      c.applyFilter(item.searchQuery || '', false);
      // youbiフィルター
      if (item.youbiFilter && item.youbiFilter.colIdx !== null) {
        c.setYoubiFilter({
          colIdx:         item.youbiFilter.colIdx,
          selectedValues: new Set(item.youbiFilter.selectedValues),
          filterType:     item.youbiFilter.filterType || 'exact'
        });
      } else {
        c.setYoubiFilter({ colIdx: null, selectedValues: new Set(), filterType: 'exact' });
      }
      c.renderTable();
      c.updateStatus();
    }

    const currentFile = ctx() ? ctx().getFilename() : '';
    if (item.filename && item.filename !== currentFile) {
      window._histPendingRestore = { applyFn: applyState, filename: item.filename };
      const sel = document.getElementById('gitFileSelector');
      if (sel) {
        for (const opt of sel.options) {
          if (decodeURIComponent(opt.value) === item.filename) { sel.value = opt.value; break; }
        }
      }
      ctx().loadFromGitHub(item.filename);
    } else {
      applyState();
    }
  };

  window.toggleHistPanel = function() {
    const panel = document.getElementById('hist-panel');
    const overlay = document.getElementById('hist-overlay');
    if (panel.classList.contains('open')) {
      panel.classList.remove('open'); overlay.classList.remove('show');
    } else {
      renderHist(); panel.classList.add('open'); overlay.classList.add('show');
    }
  };
  window.closeHistPanel = function() {
    document.getElementById('hist-panel').classList.remove('open');
    document.getElementById('hist-overlay').classList.remove('show');
  };
})();
</script>
